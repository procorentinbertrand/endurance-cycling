<!DOCTYPE html>

  <link rel="stylesheet" href="css/principal.css">
  <link rel="stylesheet" href="css/galerie.css">
</head>
<body>

      <span></span>
      <span></span>
      <span></span>

    <nav id="nav-links">

<!-- HERO ALBUM -->

      <!-- Répétez ce bloc pour chaque photo -->
      <div class="photo-item" onclick="openLightbox(this)">
        <img src="images/altea-2026/altea-53x11.JPG" alt="Photo 1 — Magasin 53x11">
      </div>
      <div class="photo-item" onclick="openLightbox(this)">
        <img src="images/altea-2026/altea-53x11.JPG" alt="Photo 1 — Magasin 53x11">
      </div>
      <div class="photo-item" onclick="openLightbox(this)">
        <img src="images/altea-2026/altea-53x11.JPG" alt="Photo 1 — Magasin 53x11">
      </div>
      <div class="photo-item" onclick="openLightbox(this)">
        <img src="images/altea-2026/altea-53x11.JPG" alt="Photo 1 — Magasin 53x11">
      </div>
      <div class="photo-item" onclick="openLightbox(this)">
        <img src="images/altea-2026/altea-53x11.JPG" alt="Photo 1 — Magasin 53x11">
      </div>
      <div class="photo-item" onclick="openLightbox(this)">

<!-- LIEN RETOUR -->
<div class="container" style="padding-bottom: 60px;">
  <a href="galerie-photos.html" class="btn">← Retour à la galerie photos</a>
</div>

<!-- FOOTER -->
<footer>
  <p>© 2026 - Endurance Cycling - Watts Mafia</p>
</footer>

<!-- BOUTON RETOUR EN HAUT -->
<button id="scrollTopBtn" class="scroll-top-btn" aria-label="Retour en haut de page">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="18 15 12 9 6 15"></polyline>
  </svg>
</button>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <button class="lightbox-prev" onclick="changePhoto(-1, event)">&#8249;</button>
  <img src="" alt="" id="lightbox-img">
  <button class="lightbox-next" onclick="changePhoto(1, event)">&#8250;</button>
</div>

<!-- JS HAMBURGER + LIGHTBOX -->
<script>
  // Hamburger
  const hamburger = document.getElementById('hamburger');
  const navLinks = document.getElementById('nav-links');
  hamburger.addEventListener('click', () => {
    navLinks.classList.toggle('active');
  });

  // Lightbox
  const photos = Array.from(document.querySelectorAll('.photo-item img'));
  let currentIndex = 0;

  function openLightbox(item) {
    const img = item.querySelector('img');
    currentIndex = photos.indexOf(img);
    document.getElementById('lightbox-img').src = img.src;
    document.getElementById('lightbox-img').alt = img.alt;
    document.getElementById('lightbox').classList.add('active');
    document.body.style.overflow = 'hidden';
  }

  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('active');
    document.body.style.overflow = '';
  }

  function changePhoto(direction, event) {
    event.stopPropagation();
    currentIndex = (currentIndex + direction + photos.length) % photos.length;
    document.getElementById('lightbox-img').src = photos[currentIndex].src;
    document.getElementById('lightbox-img').alt = photos[currentIndex].alt;
  }

  // Fermer avec la touche Échap
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeLightbox();
    if (e.key === 'ArrowRight') changePhoto(1, { stopPropagation: () => {} });
    if (e.key === 'ArrowLeft') changePhoto(-1, { stopPropagation: () => {} });
  });

/* --- Retour en haut --- */
const scrollTopBtn = document.getElementById('scrollTopBtn');

window.addEventListener('scroll', () => {
  if (window.scrollY > 300) {
    scrollTopBtn.classList.add('visible');
  } else {
    scrollTopBtn.classList.remove('visible');
  }
});

scrollTopBtn.addEventListener('click', () => {
  window.scrollTo({ top: 0, behavior: 'smooth' });
});
</script>
</body>
</html>
